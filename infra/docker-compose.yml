services:

  # ── Redis ─────────────────────────────────────────────────────────────────
  # Used for: conversation state cache (Phase 7), BullMQ queue (Future B)
  redis:
    image: redis:7-alpine
    container_name: ai-orchestrator-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai-orchestrator-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis-commander:
    profiles: ["dev"]
    image: rediscommander/redis-commander:latest
    container_name: ai-orchestrator-redis-ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379"
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ai-orchestrator-net

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  # Phase A — persist conversation history
  postgres:
    image: postgres:16-alpine
    container_name: ai-orchestrator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai_orchestrator}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-orchestrator-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── PostgreSQL (Homepage Platform) ────────────────────────────────────────
  postgres-hp:
    image: postgres:16-alpine
    container_name: homepage-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB_HP:-homepage_platform}
    ports:
      - "5434:5432"
    volumes:
      - postgres_hp_data:/var/lib/postgresql/data
    networks:
      - ai-orchestrator-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
  postgres_data:
  postgres_hp_data:

networks:
  ai-orchestrator-net:
    driver: bridge
