services:

  # ── Redis ─────────────────────────────────────────────────────────────────
  # Used for: conversation state cache (Phase 7), BullMQ queue (Future B)
  redis:
    image: redis:7-alpine
    container_name: ai-orchestrator-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai-orchestrator-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: ai-orchestrator-redis-ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379"
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ai-orchestrator-net

