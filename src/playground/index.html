<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Orchestrator — Playground</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 14px 20px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 15px; font-weight: 600; color: #fff; }

    #conv-id-display {
      font-size: 11px;
      color: #666;
      margin-left: auto;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      background: #2563eb;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .msg.assistant.streaming::after {
      content: '▌';
      animation: blink 0.7s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    footer {
      padding: 14px 20px;
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
      display: flex;
      gap: 10px;
    }

    #input {
      flex: 1;
      background: #252525;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      padding: 10px 14px;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 160px;
    }

    #input:focus { border-color: #2563eb; }

    button {
      background: #2563eb;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      padding: 0 20px;
      transition: background 0.15s;
    }

    button:hover { background: #1d4ed8; }
    button:disabled { background: #374151; cursor: not-allowed; }

    #new-conv {
      background: #252525;
      border: 1px solid #333;
      color: #aaa;
      font-weight: 400;
      padding: 0 14px;
    }

    #new-conv:hover { background: #2a2a2a; color: #fff; }
  </style>
</head>
<body>
  <header>
    <h1>AI Orchestrator Playground</h1>
    <span id="conv-id-display">No active conversation</span>
  </header>

  <div id="messages"></div>

  <footer>
    <textarea id="input" placeholder="Type a message… (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
    <button id="new-conv" title="Start new conversation">New</button>
    <button id="send-btn">Send</button>
  </footer>

  <script>
    const API_BASE = 'http://localhost:3000/ai';

    let conversationId = null;
    let isStreaming = false;

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const newConvBtn = document.getElementById('new-conv');
    const convIdDisplay = document.getElementById('conv-id-display');

    function setConvId(id) {
      conversationId = id;
      convIdDisplay.textContent = id ? `conv: ${id.slice(0, 8)}…` : 'No active conversation';
    }

    function appendMessage(role, text = '') {
      const el = document.createElement('div');
      el.className = `msg ${role}`;
      el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    async function send() {
      const message = inputEl.value.trim();
      if (!message || isStreaming) return;

      isStreaming = true;
      sendBtn.disabled = true;
      inputEl.value = '';

      appendMessage('user', message);
      const assistantEl = appendMessage('assistant', '');
      assistantEl.classList.add('streaming');

      try {
        const res = await fetch(`${API_BASE}/chat/stream`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, conversationId }),
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (line.startsWith('event: chunk')) continue;
            if (!line.startsWith('data:')) continue;

            const raw = line.slice(5).trim();
            let parsed;
            try { parsed = JSON.parse(raw); } catch { continue; }

            if (parsed.text) {
              assistantEl.textContent += parsed.text;
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }

            if (parsed.conversationId) setConvId(parsed.conversationId);
          }
        }
      } catch (err) {
        assistantEl.textContent = `Error: ${err.message}`;
      } finally {
        assistantEl.classList.remove('streaming');
        isStreaming = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', send);

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    newConvBtn.addEventListener('click', () => {
      setConvId(null);
      messagesEl.innerHTML = '';
    });
  </script>
</body>
</html>
